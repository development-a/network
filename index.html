<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Network Build Challenge</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:sans-serif;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
}

.stats{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.stat{
    flex:1;
    min-width:150px;
}

.label{
    color:#94a3b8;
}

.value{
    font-size:30px;
    font-weight:bold;
}

.topology{
    text-align:center;
    font-family:monospace;
    font-size:22px;
    line-height:2;
}

textarea{
    width:100%;
    height:250px;
    background:black;
    color:#00ff00;
    border:none;
    padding:15px;
    font-family:monospace;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    margin-right:10px;
}

#checkBtn{
    background:#16a34a;
}

#nextBtn{
    background:#2563eb;
}

#result{
    margin-top:15px;
    font-size:18px;
}

.success{
    color:#22c55e;
}

.fail{
    color:#ef4444;
}

</style>

</head>

<body>

<header>
<h1>Network Build Challenge</h1>
<p>Cisco CLI構築トレーニング</p>
</header>

<div class="container">

<div class="card">

<div class="stats">

<div class="stat">
<div class="label">Level</div>
<div class="value" id="level">1</div>
</div>

<div class="stat">
<div class="label">Score</div>
<div class="value" id="score">0</div>
</div>

<div class="stat">
<div class="label">Correct</div>
<div class="value" id="correct">0</div>
</div>

</div>

</div>

<div class="card">

<h2>課題</h2>

<p id="question">
VLAN10を作成してください
</p>

</div>

<div class="card">

<h2>構成図</h2>

<div class="topology">

PC-A <br>
｜ <br>
SW1 <br>
｜ <br>
PC-B

</div>

</div>

<div class="card">

<h2>CLI入力</h2>

<textarea
id="cliInput"
placeholder="ここに設定を入力してください"></textarea>

<br><br>

<button id="checkBtn"
onclick="checkAnswer()">
採点する </button>

<button id="nextBtn"
onclick="nextQuestion()">
次の問題 </button>

<div id="result"></div>

</div>

</div>

<script>
function parseConfig(text){

    const state = {
        vlans:[],
        accessPorts:{},
        trunkPorts:[],
        ipAddresses:{},
        ospfProcess:null
    };

    let currentInterface = null;

    const lines = text
        .toLowerCase()
        .split("\n");

    for(let rawLine of lines){

        const line = rawLine.trim();

        if(line === ""){
            continue;
        }

        if(line.startsWith("vlan ")){

            const vlan =
            parseInt(
                line.split(" ")[1]
            );

            if(!isNaN(vlan)){
                state.vlans.push(vlan);
            }

            continue;
        }

        if(line.startsWith("interface ")){

            currentInterface =
            line.replace(
                "interface ",
                ""
            );

            continue;
        }

        if(
            line.startsWith(
                "switchport access vlan "
            )
        ){

            const vlan =
            parseInt(
                line.split(" ").pop()
            );

            if(
                currentInterface &&
                !isNaN(vlan)
            ){

                state.accessPorts[
                    currentInterface
                ] = vlan;

            }

            continue;
        }

        if(
            line ===
            "switchport mode trunk"
        ){

            if(currentInterface){

                state.trunkPorts.push(
                    currentInterface
                );

            }

            continue;
        }

        if(
            line.startsWith(
                "ip address "
            )
        ){

            const parts =
            line.split(" ");

            if(
                currentInterface &&
                parts.length >= 4
            ){

                state.ipAddresses[
                    currentInterface
                ] = parts[2];

            }

            continue;
        }

        if(
            line.startsWith(
                "router ospf "
            )
        ){

            state.ospfProcess =
            parseInt(
                line.split(" ")[2]
            );

            continue;
        }

    }

    return state;

}
function gradeState(
    actual,
    expected
){

    let passed = [];
    let failed = [];

    if(expected.vlans){

        expected.vlans.forEach(vlan=>{

            if(
                actual.vlans.includes(vlan)
            ){
                passed.push(
                    `VLAN ${vlan}`
                );
            }else{
                failed.push(
                    `VLAN ${vlan}`
                );
            }

        });

    }

    if(expected.accessPorts){

        Object.entries(
            expected.accessPorts
        ).forEach(([port,vlan])=>{

            if(
                actual.accessPorts[port]
                === vlan
            ){

                passed.push(
                    `${port} VLAN${vlan}`
                );

            }else{

                failed.push(
                    `${port} VLAN${vlan}`
                );

            }

        });

    }

    if(expected.trunkPorts){

        expected.trunkPorts.forEach(port=>{

            if(
                actual.trunkPorts.includes(
                    port
                )
            ){

                passed.push(
                    `${port} Trunk`
                );

            }else{

                failed.push(
                    `${port} Trunk`
                );

            }

        });

    }

    if(
        expected.ospfProcess
        !== undefined
    ){

        if(
            actual.ospfProcess
            === expected.ospfProcess
        ){

            passed.push(
                `OSPF ${expected.ospfProcess}`
            );

        }else{

            failed.push(
                `OSPF ${expected.ospfProcess}`
            );

        }

    }

    return {
        passed,
        failed
    };

}
const questions = [

{
 level:1,
 question:"VLAN10を作成してください",

 expected:{
   vlans:[10]
 }
},

{
level:1,
question:"VLAN20を作成してください",
keywords:[
"vlan 20"
]
},

{
level:2,
question:"Gi0/1をVLAN10へ割り当ててください",
keywords:[
"interface gi0/1",
"switchport access vlan 10"
]
},

{
level:2,
question:"Gi0/2をVLAN20へ割り当ててください",
keywords:[
"interface gi0/2",
"switchport access vlan 20"
]
},

{
level:3,
question:"Gi0/24をTrunkポートにしてください",
keywords:[
"interface gi0/24",
"switchport mode trunk"
]
},

{
level:4,
question:"VLAN10のSVIを作成してください",
keywords:[
"interface vlan 10",
"ip address"
]
},

{
level:5,
question:"Gi0/0へ192.168.1.1/24を設定してください",
keywords:[
"interface gi0/0",
"ip address 192.168.1.1 255.255.255.0"
]
},

{
level:6,
question:"OSPFプロセス1を起動してください",
keywords:[
"router ospf 1"
]
},

{
level:7,
question:"10.0.0.0/24をarea0へ広告してください",
keywords:[
"network 10.0.0.0 0.0.0.255 area 0"
]
},

{
level:8,
question:"デフォルトルートを設定してください",
keywords:[
"ip route 0.0.0.0 0.0.0.0"
]
}

];

let currentQuestion = 0;

let score =
parseInt(
localStorage.getItem("score")
) || 0;

let correct =
parseInt(
localStorage.getItem("correct")
) || 0;

document.getElementById("score").textContent =
score;

document.getElementById("correct").textContent =
correct;

loadQuestion();

function loadQuestion(){

const q =
questions[currentQuestion];

document.getElementById("question")
.textContent =
q.question;

document.getElementById("level")
.textContent =
q.level;

document.getElementById("cliInput")
.value = "";

document.getElementById("result")
.innerHTML = "";

}

function checkAnswer(){

    const input =
    document
    .getElementById(
        "cliInput"
    )
    .value;

    const state =
    parseConfig(input);

    const q =
    questions[
        currentQuestion
    ];

    const result =
    gradeState(
        state,
        q.expected
    );

    const resultArea =
    document.getElementById(
        "result"
    );

    if(
        result.failed.length === 0
    ){

        score +=
        q.level * 10;

        correct++;

        localStorage.setItem(
            "score",
            score
        );

        localStorage.setItem(
            "correct",
            correct
        );

        document
        .getElementById(
            "score"
        )
        .textContent =
        score;

        document
        .getElementById(
            "correct"
        )
        .textContent =
        correct;

        resultArea.className =
        "success";

        resultArea.innerHTML =
        "✅ 正解";

    }else{

        resultArea.className =
        "fail";

        resultArea.innerHTML =
        `
        ❌ 不正解<br><br>

        OK:
        ${result.passed.join(", ")}
        <br><br>

        不足:
        ${result.failed.join(", ")}
        `;

    }

}

}

function nextQuestion(){

currentQuestion++;

if(
currentQuestion >=
questions.length
){

currentQuestion = 0;

}

loadQuestion();

}

window.onload = function(){

loadQuestion();

}
</script>


</body>
</html>
