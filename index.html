<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Network Build Challenge</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:sans-serif;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
}

.stats{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.stat{
    flex:1;
    min-width:150px;
}

.label{
    color:#94a3b8;
}

.value{
    font-size:30px;
    font-weight:bold;
}

.topology{
    text-align:center;
    font-family:monospace;
    font-size:22px;
    line-height:2;
}

textarea{
    width:100%;
    height:250px;
    background:black;
    color:#00ff00;
    border:none;
    padding:15px;
    font-family:monospace;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    margin-right:10px;
}

#checkBtn{
    background:#16a34a;
}

#nextBtn{
    background:#2563eb;
}

#result{
    margin-top:15px;
    font-size:18px;
}

.success{
    color:#22c55e;
}

.fail{
    color:#ef4444;
}

</style>

</head>

<body>

<header>
<h1>Network Build Challenge</h1>
<p>Cisco CLI構築トレーニング</p>
</header>

<div class="container">

<div class="card">

<div class="stats">

<div class="stat">
<div class="label">Level</div>
<div class="value" id="level">1</div>
</div>

<div class="stat">
<div class="label">Score</div>
<div class="value" id="score">0</div>
</div>

<div class="stat">
<div class="label">Correct</div>
<div class="value" id="correct">0</div>
</div>

</div>

</div>

<div class="card">

<h2>課題</h2>

<p id="question">
VLAN10を作成してください
</p>

</div>

<div class="card">

<h2>構成図</h2>

<div class="topology">

PC-A <br>
｜ <br>
SW1 <br>
｜ <br>
PC-B

</div>

</div>

<div class="card">

<h2>CLI入力</h2>

<textarea
id="cliInput"
placeholder="ここに設定を入力してください"></textarea>

<br><br>

<button id="checkBtn"
onclick="checkAnswer()">
採点する </button>

<button id="nextBtn"
onclick="nextQuestion()">
次の問題 </button>

<div id="result"></div>

</div>

</div>

<script>

/* Part2をここへ貼る */

</script>

</body>
</html>
