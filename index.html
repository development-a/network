<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pingが通るネットワークを作れ！</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:sans-serif;
}

header{
    background:#1e293b;
    padding:15px;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.topology{
    text-align:center;
    font-size:28px;
    line-height:2;
    font-family:monospace;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:none;
    border-radius:5px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.success{
    color:#22c55e;
}

.fail{
    color:#ef4444;
}

</style>
</head>
<body>

<header>
<h1>Pingが通るネットワークを作れ！</h1>
<p>レベル1 VLAN + Trunk</p>
</header>

<div class="container">

<div class="card">
<h2>課題</h2>

<p>

PC-A と PC-B が通信できるようにしてください。

正解条件

・Gi0/1 → VLAN10

・Gi0/2 → VLAN10

・Gi0/24 → Trunk ON

</p>

</div>

<div class="card">

<h2>構成図</h2>

<div class="topology">

💻PC-A

│

🔀SW1

│

💻PC-B

</div>

</div>

<div class="grid">

<div class="card">

<h2>PC-A</h2>

<label>IPアドレス</label>
<input
id="pcaIp"
value="192.168.1.10">

<h2>SW1</h2>

<label>Gi0/1 VLAN</label>
<select id="g1">

<option>1</option>
<option>10</option>
<option>20</option>

</select>

<label>Gi0/2 VLAN</label>
<select id="g2">

<option>1</option>
<option>10</option>
<option>20</option>

</select>

<label>Gi0/24 Trunk</label>
<select id="trunk">

<option>OFF</option>
<option>ON</option>

</select>

</div>

<div class="card">

<h2>PC-B</h2>

<label>IPアドレス</label>
<input
id="pcbIp"
value="192.168.1.20">

<h2>操作</h2>

<button onclick="runPing()">
Ping実行
</button>

<div id="result"></div>

</div>

</div>

</div>

<script>

function runPing(){

const g1 =
document.getElementById("g1").value;

const g2 =
document.getElementById("g2").value;

const trunk =
document.getElementById("trunk").value;

const pcaIp =
document.getElementById("pcaIp").value;

const pcbIp =
document.getElementById("pcbIp").value;

const result =
document.getElementById("result");

if(g1 !== "10"){

result.className="fail";

result.innerHTML=
"❌ Gi0/1がVLAN10ではありません";

return;

}

if(g2 !== "10"){

result.className="fail";

result.innerHTML=
"❌ Gi0/2がVLAN10ではありません";

return;

}

if(trunk !== "ON"){

result.className="fail";

result.innerHTML=
"❌ Trunkが有効ではありません";

return;

}

if(
!pcaIp.startsWith("192.168.1.")
){

result.className="fail";

result.innerHTML=
"❌ PC-AのIPが不正です";

return;

}

if(
!pcbIp.startsWith("192.168.1.")
){

result.className="fail";

result.innerHTML=
"❌ PC-BのIPが不正です";

return;

}

result.className="success";

result.innerHTML=
`
✅ Ping成功

Reply from ${pcbIp}

bytes=32 time<1ms TTL=128
`;

}

</script>

</body>
</html>
