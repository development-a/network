<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingを通せ！障害切り分けシミュレーター</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Pingを通せ！障害切り分けシミュレーター</h1>

    <div class="player-info">
        <span id="level">Lv.1</span>
        <span id="score">Score: 0</span>
    </div>
</header>

<main>

    <!-- 左側 -->
    <section class="top-panel">

        <div class="network-card">
            <h2>ネットワーク構成図</h2>

            <div id="network-diagram">

                <div class="device pc">
                    <div class="device-name">PC1</div>
                    <div class="device-ip">192.168.10.10/24</div>
                </div>

                <div class="line"></div>

                <div class="device switch">
                    <div class="device-name">SW1</div>
                </div>

                <div class="line"></div>

                <div class="device router">
                    <div class="device-name">R1</div>
                </div>

                <div class="line"></div>

                <div class="device server">
                    <div class="device-name">Server1</div>
                    <div class="device-ip">192.168.20.10/24</div>
                </div>

            </div>
        </div>

        <div class="objective-card">
            <h2>ミッション</h2>

            <p id="mission-text">
                PC1からServer1へPingを成功させよ。
            </p>

            <div class="status-box">
                <span id="ping-status" class="status-fail">
                    Ping失敗
                </span>
            </div>
        </div>

    </section>

    <!-- CLI -->
    <section class="console-panel">

        <div class="console-header">
            Terminal
        </div>

        <div id="console-output" class="console-output">

            <div>
                Welcome to Network Trouble Simulator
            </div>

            <div>
                help と入力するとコマンド一覧が表示されます
            </div>

        </div>

        <div class="console-input-area">

            <span class="prompt">&gt;</span>

            <input
                type="text"
                id="command-input"
                autocomplete="off"
                placeholder="show vlan"
            >

        </div>

    </section>

    <!-- 回答エリア -->
    <section class="answer-panel">

        <h2>障害原因を回答</h2>

        <textarea
            id="answer-input"
            rows="4"
            placeholder="例：SW1 Gi0/2 の VLAN設定ミス"
        ></textarea>

        <button id="submit-answer">
            回答する
        </button>

    </section>

</main>

<footer>
    GitHub Pages Edition
</footer>

<script src="data/scenarios.js"></script>

<script src="js/storage.js"></script>
<script src="js/renderer.js"></script>
<script src="js/cli.js"></script>
<script src="js/game.js"></script>
<script src="js/app.js"></script>

</body>
</html>
