<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネットワーク障害切り分けシミュレーター</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 0 5px rgba(0,0,0,.1);
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

pre{
    background:#222;
    color:#00ff00;
    padding:15px;
    overflow:auto;
}

select{
    padding:8px;
}
</style>

</head>

<body>

<h1>ネットワーク障害切り分けシミュレーター</h1>

<div class="card">
<h3>構成図</h3>

<pre>
PC-A
 |
SW1
 |
R1
 |
PC-B
</pre>

<p>
PC-A から PC-B に Ping が通りません。<br>
showコマンドを実行して原因を特定してください。
</p>

<button onclick="showCommand('interface')">show ip interface brief</button>

<button onclick="showCommand('vlan')">show vlan brief</button>

<button onclick="showCommand('route')">show ip route</button>

<button onclick="showCommand('ospf')">show ip ospf neighbor</button>

</div>

<div class="card">
<h3>コマンド結果</h3>
<pre id="output">ここに表示されます</pre>
</div>

<div class="card">
<h3>原因を選択</h3>

<select id="answer">
<option>Interface Shutdown</option>
<option>VLAN設定ミス</option>
<option>ルート不足</option>
<option>OSPFネイバー未成立</option>
</select>

<button onclick="checkAnswer()">回答する</button>

<p id="result"></p>
</div>

<button onclick="newProblem()">新しい問題</button>

<script>

let fault;

function newProblem(){

const faults=[
"shutdown",
"vlan",
"route",
"ospf"
];

fault=faults[Math.floor(Math.random()*faults.length)];

document.getElementById("output").textContent=
"showコマンドを実行してください";

document.getElementById("result").innerHTML="";
}

function showCommand(type){

let text="";

if(type==="interface"){

if(fault==="shutdown"){
text=
`Interface       Status
Gi0/0            up
Gi0/1            administratively down`;
}
else{
text=
`Interface       Status
Gi0/0            up
Gi0/1            up`;
}
}

if(type==="vlan"){

if(fault==="vlan"){
text=
`VLAN  Name
10    SALES

Gi0/1 -> VLAN20`;
}
else{
text=
`VLAN  Name
10    SALES

Gi0/1 -> VLAN10`;
}
}

if(type==="route"){

if(fault==="route"){
text=
`Gateway of last resort is not set`;
}
else{
text=
`O 10.1.1.0/24
C 192.168.1.0/24`;
}
}

if(type==="ospf"){

if(fault==="ospf"){
text=
`Neighbor ID
No neighbors found`;
}
else{
text=
`Neighbor ID
1.1.1.1 FULL`;
}
}

document.getElementById("output").textContent=text;
}

function checkAnswer(){

const selected=
document.getElementById("answer").value;

let correct="";

if(fault==="shutdown")
correct="Interface Shutdown";

if(fault==="vlan")
correct="VLAN設定ミス";

if(fault==="route")
correct="ルート不足";

if(fault==="ospf")
correct="OSPFネイバー未成立";

if(selected===correct){

document.getElementById("result").innerHTML=
"<h2 style='color:green'>正解！</h2>";

}else{

document.getElementById("result").innerHTML=
"<h2 style='color:red'>不正解</h2><p>正解："+correct+"</p>";
}

}

newProblem();

</script>

</body>
</html>
